system {
    host-name ams-dc1-core-1;
    domain-name dc.example.com;
    login {
        user admin {
            class super-user;
            authentication {
                encrypted-password "$6$obfuscated";
            }
        }
    }
    services {
        ssh;
    }
}
interfaces {
    fxp0 {
        unit 0 {
            family inet {
                address 10.200.0.1/24;
            }
        }
    }
    et-0/0/0 {
        description "UPLINK-Internet-Router-et0/0/0";
        unit 0 {
            family inet {
                address 10.0.0.1/30;
            }
        }
    }
    xe-0/0/0 {
        description "DOWNLINK-ams-dc1-leaf-1";
        unit 0 {
            family inet;
        }
    }
    xe-0/0/1 {
        description "DOWNLINK-ams-dc1-leaf-2";
        unit 0 {
            family inet;
        }
    }
}
routing-options {
    static {
        route 0.0.0.0/0 next-hop 10.200.0.254;
    }
}
