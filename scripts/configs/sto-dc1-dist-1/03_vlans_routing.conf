hostname sto-dc1-dist-1
!
ip domain-name dc.example.com
!
aaa new-model
username admin privilege 15 secret 9 $9$obfuscated
!
vlan 100
 name SERVERS
vlan 200
 name STORAGE
vlan 300
 name MANAGEMENT
vlan 400
 name DMZ
vlan 500
 name BACKUP
!
interface Management0
 description OOB-Management
 ip address 10.100.0.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet1/0/1
 description UPLINK-sto-dc1-core-1-Gi1/0/2
 no switchport
 ip address 10.1.0.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet1/0/2
 description DOWNLINK-Access-rack-A
 switchport mode trunk
 switchport trunk allowed vlan 100,200,300,400,500
 no shutdown
!
interface GigabitEthernet1/0/3
 description DOWNLINK-Access-rack-A
 switchport mode trunk
 switchport trunk allowed vlan 100,200,300,400,500
 no shutdown
!
interface Vlan100
 description SERVERS-GW
 ip address 10.100.101.1 255.255.255.0
 no shutdown
!
ip route 0.0.0.0 0.0.0.0 10.1.0.1
ip route vrf Mgmt-vrf 0.0.0.0 0.0.0.0 10.100.0.254
!
line vty 0 4
 login local
 transport input ssh
!
end
