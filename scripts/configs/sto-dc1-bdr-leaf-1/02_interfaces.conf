system {
    host-name sto-dc1-bdr-leaf-1;
    domain-name dc.example.com;
    login {
        user admin {
            class super-user;
            authentication {
                encrypted-password "$6$obfuscated";
            }
        }
    }
    services {
        ssh;
    }
}
interfaces {
    fxp0 {
        unit 0 {
            family inet {
                address 10.100.0.4/24;
            }
        }
    }
    xe-0/0/0 {
        description "UPLINK-sto-dc1-core-1-xe0/0/48";
        unit 0 {
            family inet {
                address 10.0.0.4/30;
            }
        }
    }
    xe-0/0/1 {
        description "DOWNLINK-External-AS65001";
        unit 0 {
            family inet;
        }
    }
    xe-0/0/2 {
        description "DOWNLINK-External-AS65001";
        unit 0 {
            family inet;
        }
    }
}
routing-options {
    static {
        route 0.0.0.0/0 next-hop 10.100.0.254;
    }
}
